<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COIN HOME | ATELIER</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="header-left">
            <div class="menu-burger" onclick="toggleMenu()">
                <div class="line"></div>
                <div class="line"></div>
            </div>
            <span class="menu-text" onclick="toggleMenu()">MENU</span>
        </div>
        
        <div class="logo-center">
            <a href="/"><img src="logo-coin-atelier.svg" alt="COIN HOME" class="main-logo"></a>
        </div>

        <div class="header-right">
            <span class="search-trigger" onclick="toggleSearch()">RICERCA</span>
            <div class="user-nav">
                <span onclick="toggleLogin()">ACCEDI</span>
                <span>CARRELLO (0)</span>
            </div>
        </div>
    </header>

    <div id="side-menu" class="side-menu">
        <span class="close-x" onclick="toggleMenu()">CHIUDI</span>
        <nav class="side-nav-content">
            <ul class="main-cats">
                <li><a href="#">NUOVI ARRIVI</a></li>
                <li><a href="#">CAMERA DA LETTO</a></li>
                <li><a href="#">SOGGIORNO</a></li>
                <li><a href="#">CUCINA</a></li>
                <li><a href="#">BAGNO</a></li>
                <li class="special-link"><a href="#">PROMOZIONI %</a></li>
            </ul>
        </nav>
    </div>

    <div id="search-overlay" class="search-overlay">
        <span class="close-x" onclick="toggleSearch()">CHIUDI</span>
        <div class="search-body">
            <label>COSA STAI CERCANDO?</label>
            <input type="text" id="search-input" placeholder="" autocomplete="off">
        </div>
    </div>

    <div id="login-overlay" class="login-overlay">
        <span class="close-x" onclick="toggleLogin()">CHIUDI</span>
        <div class="login-form">
            <h3>ACCEDI AL TUO ACCOUNT</h3>
            <div class="zara-field">
                <label>E-MAIL</label>
                <input type="email">
            </div>
            <div class="zara-field">
                <label>PASSWORD</label>
                <input type="password">
            </div>
            <button class="btn-dark">ACCEDI</button>
        </div>
    </div>

    <main>
        <div class="product-grid">
            <div class="product-card"><img src="https://static.zarahome.net/assets/public/6ec8/bd73/31e8424682ac/7cc3c382f/43386029052-a7/43386029052-a7.jpg"></div>
            <div class="product-card"><img src="https://static.zarahome.net/assets/public/008b/76b7/e00a44279b9c/0438b4d8d1e2/43386029052-a7.jpg"></div>
            <div class="product-card"><img src="https://static.zarahome.net/assets/public/6641/1231/948348638685/2919d3640b39/43343029052-a7.jpg"></div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
