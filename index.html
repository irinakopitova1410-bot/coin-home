<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>COIN HOME | Official Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital@0;1&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="luxury-header">
        <div class="burger-container" onclick="openNav()">
            <div class="line"></div>
            <div class="line"></div>
        </div>
        <div class="brand-logo" onclick="location.reload()">COIN HOME</div>
        <div class="user-icon" onclick="cambiaUser('VIP')">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </div>
    </header>
<div class="search-container">
    <div class="search-glass">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
        </svg>
        <input type="text" id="main-search" placeholder="CERCA NELL'ATELIER..." onkeyup="filtraProdotti()">
    </div>
</div>
    <div id="full-menu" class="overlay-nav">
        <a href="javascript:void(0)" class="close-btn" onclick="closeNav()">&times;</a>
        <div class="overlay-content">
            <div class="menu-section">
                <span class="section-title">COLLEZIONI</span>
                <a href="#" onclick="cambiaUser('Standard'); closeNav()">NUOVI ARRIVI</a>
                <a href="#" onclick="cambiaUser('VIP'); closeNav()" style="color:#d00; font-weight:500;">SPECIAL PRICE VIP %</a>
            </div>
            <div class="menu-section">
                <span class="section-title">CATEGORIE</span>
                <a href="#" onclick="closeNav()">SOGGIORNO</a>
                <a href="#" onclick="closeNav()">CAMERA DA LETTO</a>
                <a href="#" onclick="closeNav()">FRAGRANZE</a>
            </div>
        </div>
    </div>

    <main id="griglia-prodotti" class="zara-grid">
        </main>

    <footer class="quick-nav">
        <button onclick="cambiaUser('Standard')">HOME</button>
        <button onclick="cambiaUser('VIP')" style="color: #d00; font-weight: 600;">AREA VIP %</button>
    </footer>
<script src="script.js"></script>
    <div id="newsletter-popup" class="popup-overlay">
        <div class="popup-content">
            <span class="close-popup" onclick="closePopup()">&times;</span>
            <h3 class="popup-title">NON HAI ANCORA LA NOSTRA APP?</h3>
            <div class="qr-container">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://coin-home.onrender.com/" alt="QR Code">
                <p>Scaricale subito!</p>
            </div>
            <div class="newsletter-section">
                <h4>ISCRIVITI ALLA NOSTRA NEWSLETTER</h4>
                <p>Iscriviti alla nostra newsletter e riceverai tutte le novità di COIN HOME.</p>
                <div class="input-group">
                    <input type="email" id="news-email" placeholder="Email*">
                    <button onclick="subscribe()">SOTTOSCRIVITI</button>
                </div>
            </div>
        </div>
    </div>
    </body>
</html>







    
</body>
</html>
