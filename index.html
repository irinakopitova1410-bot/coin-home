<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COIN HOME | ATELIER</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;1,400&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="header-left">
            <div class="menu-burger" onclick="toggleMenu()">
                <div class="line"></div>
                <div class="line"></div>
                <span class="menu-text">MENU</span>
            </div>
        </div>

        <div class="header-center">
            <a href="/"><img src="logo-coin-atelier.svg" alt="COIN HOME" class="main-logo"></a>
        </div>

        <div class="header-right">
            <span class="search-btn" onclick="toggleSearch()">CERCA</span>
            <div class="user-nav">
                <span>ACCEDI</span>
                <span>(0)</span>
            </div>
        </div>
    </header>

    <div id="search-overlay" class="search-overlay">
        <span class="close-btn" onclick="toggleSearch()">&times;</span>
        <div class="search-content">
            <h2>COSA STAI CERCANDO?</h2>
            <input type="text" placeholder="CERCA..." id="search-input">
        </div>
    </div>

    <div id="side-menu" class="side-menu">
        <span class="close-btn" onclick="toggleMenu()">&times;</span>
        <nav>
            <ul>
                <li><a href="#">NOVITÀ</a></li>
                <li><a href="#">COLLEZIONE PETS</a></li>
                <li><a href="#">CAMERA DA LETTO</a></li>
                <li><a href="#">CUCINA</a></li>
                <li><a href="#">FRAGRANZE</a></li>
            </ul>
        </nav>
    </div>

    <main>
        <div class="product-grid">
            <div class="product-item">
                <img src="https://static.zarahome.net/assets/public/6ec8/bd73/31e8424682ac/7cc3c382f/43386029052-a7/43386029052-a7.jpg" alt="Prodotto">
                <h3>TAPPETINO IUTA</h3>
                <p>15,99 €</p>
            </div>
            </div>
    </main>

    <div id="app-popup" class="zara-popup-overlay">
        <div class="zara-popup-content">
            <span class="zara-popup-close" onclick="closeAppPopup()">&times;</span>
            <h2 class="zara-popup-title">NON HAI ANCORA LA NOSTRA APP?</h2>
            <div class="zara-popup-qr-container">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&amp;data=https://coin-home.onrender.com/" alt="QR" class="zara-popup-qr">
            </div>
            <p class="zara-popup-subtitle">SCARICALA SUBITO!</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
