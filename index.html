<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COIN HOME | ATELIER</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;1,400&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="header-left">
            <div class="menu-burger" onclick="toggleMenu()">
                <div class="line"></div>
                <div class="line"></div>
                <span>MENU</span>
            </div>
        </div>

        <div class="header-center">
            <img src="logo-coin-atelier.svg" alt="COIN HOME ATELIER" class="main-logo">
        </div>

        <div class="header-right">
            <div class="search-trigger" onclick="toggleSearch()">CERCA</div>
            <div class="user-nav">
                <span>ACCEDI</span>
                <span>(0)</span>
            </div>
        </div>
    </header>

    <div id="search-overlay" class="search-overlay">
        <span class="close-btn" onclick="toggleSearch()">&times;</span>
        <div class="search-content">
            <h2>COSA STAI CERCANDO?</h2>
            <input type="text" placeholder="CERCA PRODOTTI, COLLEZIONI..." autofocus>
        </div>
    </div>

    <main>
        <div class="product-grid">
            <div class="product-item">
                <img src="https://static.zarahome.net/assets/public/6ec8/bd73/31e8424682ac/7cc3c382f/43386029052-a7/43386029052-a7.jpg" alt="Tappeto">
                <h3>TAPPETINO IUTA</h3>
                <p>15,99 €</p>
            </div>
            <div class="product-item">
                <img src="https://static.zarahome.net/assets/public/008b/76b7/e00a44279b9c/0438b4d8d1e2/43386029052-a7.jpg" alt="Ciotola">
                <h3>CIOTOLA SILICONE</h3>
                <p>11,99 €</p>
            </div>
            <div class="product-item">
                <img src="https://static.zarahome.net/assets/public/6641/1231/948348638685/2919d3640b39/43343029052-a7.jpg" alt="Cesta">
                <h3>CESTA OSSO</h3>
                <p>39,99 €</p>
            </div>
        </div>
    </main>

    <div id="app-popup" class="zara-popup-overlay">
        <div class="zara-popup-content">
            <span class="zara-popup-close" onclick="closeAppPopup()">&times;</span>
            <h2 class="zara-popup-title">NON HAI ANCORA LA NOSTRA APP?</h2>
            <div class="zara-popup-qr-container">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&amp;data=https://coin-home.onrender.com/" alt="QR Code" class="zara-popup-qr">
            </div>
            <p class="zara-popup-subtitle">SCARICALA SUBITO!</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
