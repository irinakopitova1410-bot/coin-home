<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COIN HOME | ATELIER</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="header-left" onclick="toggleMenu()">
            <div class="menu-burger"><div class="line"></div><div class="line"></div></div>
            <span>MENU</span>
        </div>
        <div class="logo-center">
            <img src="logo-coin-atelier.svg" alt="LOGO" class="main-logo">
        </div>
        <div class="header-right">
            <span onclick="toggleSearch()">RICERCA</span>
            <span onclick="toggleLogin()" style="margin-left:20px">ACCEDI</span>
        </div>
    </header>

    <div id="side-menu" class="overlay-zara side-menu">
        <span class="close-btn" onclick="toggleMenu()">CHIUDI</span>
        <nav>
            <ul>
                <li><a href="#">NUOVI ARRIVI</a></li>
                <li class="red"><a href="#">RICICLAGGIO MAGAZZINO -50%</a></li>
                <li class="gold"><a href="#">AREA VIP</a></li>
            </ul>
        </nav>
    </div>

    <div id="search-overlay" class="overlay-zara search-bar">
        <div class="search-input-container">
            <input type="text" id="search-input" placeholder="CERCA">
            <span onclick="toggleSearch()">ANNULLA</span>
        </div>
    </div>

    <div id="login-overlay" class="overlay-zara login-screen">
        <span class="close-btn" onclick="toggleLogin()">CHIUDI</span>
        <div class="login-box">
            <h2>ACCEDI</h2>
            <input type="email" placeholder="E-MAIL">
            <input type="password" placeholder="PASSWORD">
            <button class="btn-black">ACCEDI</button>
            <div class="social-box">
                <p>O ACCEDI CON</p>
                <button class="social-btn">FACEBOOK</button>
                <button class="social-btn">GOOGLE</button>
            </div>
        </div>
    </div>

    <main>
        <div class="product-grid">
            <div class="card">
                <img src="https://static.zarahome.net/assets/public/6ec8/bd73/31e8424682ac/7cc3c382f/43386029052-a7/43386029052-a7.jpg">
                <p>PRODOTTO ATELIER</p>
                <p class="vip-price">PREZZO VIP: 69€</p>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
