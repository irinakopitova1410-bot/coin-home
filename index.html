<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COIN HOME | ATELIER</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Prata&family=Montserrat:wght@100;200;300;400&display=swap" rel="stylesheet">
</head>
<body>

    <header class="luxury-header">
        <div class="header-left">
            <div class="burger-menu">
                <div class="line"></div>
                <div class="line"></div>
            </div>
        </div>
        
        <div class="header-center">
            <a href="#" class="brand-logo">COIN HOME</a>
        </div>

        <div class="header-right">
            <div class="search-trigger" onclick="toggleSearch(true)">
                <span>CERCA</span>
                <div class="trigger-line"></div>
            </div>
            <div class="icons">
                <span>ACCEDI</span>
                <span>AIUTO</span>
                <span>(0)</span>
            </div>
        </div>
    </header>

    <div id="search-overlay" class="search-overlay">
        <div class="search-overlay-header">
            <div class="brand-logo-small">COIN HOME</div>
            <span class="close-btn" onclick="toggleSearch(false)">&times;</span>
        </div>
        
        <div class="search-content">
            <div class="input-wrapper">
                <input type="text" id="main-search" placeholder="COSA STAI CERCANDO?" onkeyup="filtraProdotti()">
                <div class="search-line-bold"></div>
            </div>
            
            <div class="search-suggestions">
                <p>PUÒ INTERESSARTI</p>
                <ul>
                    <li>NOVITÀ</li>
                    <li>COLLEZIONE PETS</li>
                    <li>CANDELARIA</li>
                    <li>TAPPETI IUTA</li>
                </ul>
            </div>
        </div>
    </div>

    <main class="zara-container">
        <div class="product-grid" id="grid-prodotti">
            <div class="product-card">
                <div class="product-image">
                    <img src="https://static.zarahome.net/assets/public/6ec8/bd73/31e8424682ac/7cc3c382f/43386029052-a7/43386029052-a7.jpg" alt="Prodotto">
                </div>
                <div class="product-info">
                    <h3 class="product-title">TAPPETINO ANIMALI DOMESTICI IUTA</h3>
                    <p class="product-price">15,99 €</p>
                </div>
            </div>
            </div>
    </main>

    <script>
        function toggleSearch(show) {
            const overlay = document.getElementById('search-overlay');
            if(show) {
                overlay.style.display = 'flex';
                setTimeout(() => { document.getElementById('main-search').focus(); }, 100);
            } else {
                overlay.style.display = 'none';
            }
        }
    </script>
</body>
</html>
