<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COIN HOME | ATELIER</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="header-left">
            <div class="menu-burger" onclick="toggleMenu()">
                <div class="line"></div>
                <div class="line"></div>
                <span class="menu-text">MENU</span>
            </div>
        </div>
        <div class="header-center">
            <a href="/"><img src="logo-coin-atelier.svg" alt="COIN HOME" class="main-logo"></a>
        </div>
        <div class="header-right">
            <span class="search-btn" onclick="toggleSearch()">CERCA</span>
            <div class="user-nav">
                <span onclick="toggleLogin()">ACCEDI</span>
                <span>(0)</span>
            </div>
        </div>
    </header>

    <div id="search-overlay" class="search-overlay">
        <span class="close-x" onclick="toggleSearch()">&times;</span>
        <div class="search-content">
            <h2>COSA STAI CERCANDO?</h2>
            <input type="text" placeholder="" id="search-input">
        </div>
    </div>

    <div id="side-menu" class="side-menu">
        <span class="close-x" onclick="toggleMenu()">&times;</span>
        <nav>
            <ul>
                <li><a href="#">NOVITÀ</a></li>
                <li><a href="#">COLLEZIONE PETS</a></li>
                <li><a href="#">CAMERA DA LETTO</a></li>
                <li><a href="#">CUCINA</a></li>
                <li><a href="#">FRAGRANZE</a></li>
            </ul>
        </nav>
    </div>

    <div id="login-overlay" class="login-overlay">
        <span class="close-x" onclick="toggleLogin()">&times;</span>
        <div class="login-container">
            <h2>EFFETTUA IL LOGIN</h2>
            <div class="input-group">
                <label>E-mail</label>
                <input type="email">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password">
            </div>
            <a href="#" class="forgot-link">Hai dimenticato la password?</a>
            <button class="btn-black">EFFETTUA IL LOGIN</button>
            <button class="btn-white">REGISTRATI</button>
            
            <div class="social-login">
                <h3>ACCESSO CON</h3>
                <button class="social-btn">CONTINUA CON FACEBOOK</button>
                <button class="social-btn">CONTINUA CON GOOGLE</button>
                <button class="social-btn">CONTINUA CON APPLE</button>
            </div>
        </div>
    </div>

    <main>
        <div class="product-grid">
            <div class="product-item"><img src="https://static.zarahome.net/assets/public/6ec8/bd73/31e8424682ac/7cc3c382f/43386029052-a7/43386029052-a7.jpg"></div>
            <div class="product-item"><img src="https://static.zarahome.net/assets/public/008b/76b7/e00a44279b9c/0438b4d8d1e2/43386029052-a7.jpg"></div>
            <div class="product-item"><img src="https://static.zarahome.net/assets/public/6641/1231/948348638685/2919d3640b39/43343029052-a7.jpg"></div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
