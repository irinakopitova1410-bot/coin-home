<!DOCTYPE html>
<html lang="it">

</head>
<body class="page-arrivals">

    <header>
        <div class="nav-left" onclick="location.href='index.html'">

            <span class="search-trigger" onclick="openUltraSearch()">RICERCA</span>

    <main class="arrivals-container">
        <div class="arrivals-header">
            <h1>NUOVI ARRIVI</h1>
            <p>Selezione Primavera / Estate 2026</p>

        <div class="arrivals-grid">

                    <img src="https://images.unsplash.com/photo-1616489953149-804364409514?q=80&w=1000" alt="New">

                <div class="info">
                    <h3>VASO CERAMICA N.02</h3>

                </div>
            </div>

            <div class="product-card">
                <div class="img-box">
                    <img src="https://images.unsplash.com/photo-1513519247388-4e282650d44d?q=80&w=800" alt="New">
                </div>
                <div class="info">
                    <h3>LAMPADA BRASS MINIMAL</h3>
                    <p>€ 185,00</p>
                </div>
            </div>
        </div>
    </main>

    <div id="search-overlay" class="search-modal">
        <span class="close-search" onclick="closeUltraSearch()">×</span>
        <div class="search-content">
            <input type="text" id="ultra-search-input" placeholder="CERCA NEI NUOVI ARRIVI...">
            <div class="search-underline"></div>
        </div>
    </div>

    <script src="script.js"></script>
